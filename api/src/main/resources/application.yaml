spring:
  application:
    name: api
  datasource:
    #rl: jdbc:postgresql://localhost:5432/flashcards_app
    #username: postgres
    #password: admin
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
      jdbc:
        time_zone: America/Sao_Paulo
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: true

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  port: ${PORT:8080}

app:
  base-url: ${BASE_URL}
  #base-url: http://localhost:8080
  frontend:
    url: ${FRONTEND_URL}
    #url: "http://localhost:5173"

api:
  security:
    token:
      secret: ${JWT_SECRET}
      #secret: ${JWT_SECRET:default-secret-dev}

logging:
  level:
    root: INFO

resend:
  api-key: ${RESEND_API_KEY}
  #api-key: re_NZLL9VQz_J4HdfYYuEV8w9yg7f4GwMbr8
  from: noreplay@updates.fabiotrindade.com.br

cloudinary:
  cloudname: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
